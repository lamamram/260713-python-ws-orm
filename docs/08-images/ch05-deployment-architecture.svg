<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="400" fill="#0d1117" rx="12"/>
  <text x="430" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#f0883e">Architecture de déploiement — FastAPI + PostgreSQL avec Docker Compose</text>

  <!-- External client -->
  <rect x="30" y="90" width="110" height="50" rx="6" fill="#1f2937" stroke="#4b5563"/>
  <text x="85" y="112" text-anchor="middle" font-size="11" fill="#e2e8f0">Client HTTP</text>
  <text x="85" y="128" text-anchor="middle" font-size="9" fill="#6b7280">:8000</text>

  <!-- Docker Compose boundary -->
  <rect x="160" y="60" width="670" height="300" rx="12" fill="#111827" stroke="#374151" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="350" y="80" font-size="11" fill="#4b5563">docker-compose.yml</text>

  <!-- Service API -->
  <rect x="180" y="100" width="280" height="220" rx="10" fill="#1f2937" stroke="#f0883e" stroke-width="2"/>
  <text x="320" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#f0883e">Service : api</text>
  <text x="320" y="138" text-anchor="middle" font-size="10" fill="#fbbf24">ports: 8000:8000</text>

  <rect x="195" y="148" width="250" height="30" rx="5" fill="#3a2000" stroke="#f0883e"/>
  <text x="320" y="167" text-anchor="middle" font-size="10" fill="#fbbf24">Gunicorn (4 workers)</text>

  <rect x="195" y="186" width="250" height="30" rx="5" fill="#3a2000" stroke="#f0883e"/>
  <text x="320" y="205" text-anchor="middle" font-size="10" fill="#fbbf24">Uvicorn (UvicornWorker)</text>

  <rect x="195" y="224" width="250" height="30" rx="5" fill="#1a2e1a" stroke="#22c55e"/>
  <text x="320" y="243" text-anchor="middle" font-size="10" fill="#86efac">FastAPI Application</text>

  <rect x="195" y="262" width="250" height="30" rx="5" fill="#2d1f3d" stroke="#a855f7"/>
  <text x="320" y="281" text-anchor="middle" font-size="10" fill="#d8b4fe">SQLAlchemy ORM</text>

  <rect x="195" y="294" width="250" height="18" rx="3" fill="#1f2937" stroke="#4b5563"/>
  <text x="320" y="307" text-anchor="middle" font-size="9" fill="#6b7280">DATABASE_URL · SECRET_KEY (env)</text>

  <!-- Service DB -->
  <rect x="530" y="100" width="270" height="220" rx="10" fill="#1f2937" stroke="#3b82f6" stroke-width="2"/>
  <text x="665" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#60a5fa">Service : db</text>
  <text x="665" y="138" text-anchor="middle" font-size="10" fill="#93c5fd">image: postgres:16-alpine</text>

  <rect x="545" y="148" width="240" height="30" rx="5" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="665" y="167" text-anchor="middle" font-size="10" fill="#93c5fd">PostgreSQL 16</text>

  <rect x="545" y="186" width="240" height="46" rx="5" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="665" y="203" text-anchor="middle" font-size="9" fill="#93c5fd">POSTGRES_DB: api_catalogue</text>
  <text x="665" y="218" text-anchor="middle" font-size="9" fill="#93c5fd">POSTGRES_USER: api_user</text>
  <text x="665" y="228" text-anchor="middle" font-size="9" fill="#93c5fd">POSTGRES_PASSWORD: ***</text>

  <rect x="545" y="240" width="240" height="30" rx="5" fill="#2d1f3d" stroke="#a855f7"/>
  <text x="665" y="259" text-anchor="middle" font-size="10" fill="#d8b4fe">Volume : postgres_data</text>
  <text x="665" y="272" text-anchor="middle" font-size="9" fill="#6b7280">Données persistées</text>

  <rect x="545" y="294" width="240" height="18" rx="3" fill="#1a2e1a" stroke="#22c55e"/>
  <text x="665" y="307" text-anchor="middle" font-size="9" fill="#86efac">healthcheck: pg_isready</text>

  <!-- Arrow client to api -->
  <line x1="140" y1="115" x2="180" y2="200" stroke="#f0883e" stroke-width="2" marker-end="url(#adpl)"/>
  <text x="155" y="155" font-size="9" fill="#f0883e">HTTP</text>
  <text x="155" y="167" font-size="9" fill="#6b7280">:8000</text>

  <!-- Arrow api to db (internal network) -->
  <line x1="460" y1="220" x2="530" y2="220" stroke="#3b82f6" stroke-width="2" marker-end="url(#adpl2)"/>
  <text x="495" y="212" text-anchor="middle" font-size="9" fill="#3b82f6">PostgreSQL</text>
  <text x="495" y="225" text-anchor="middle" font-size="8" fill="#6b7280">Réseau interne Docker</text>
  <text x="495" y="237" text-anchor="middle" font-size="8" fill="#6b7280">db:5432</text>

  <!-- Alembic -->
  <rect x="180" y="330" width="180" height="24" rx="4" fill="#1f2937" stroke="#fbbf24" stroke-dasharray="4,3"/>
  <text x="270" y="346" text-anchor="middle" font-size="9" fill="#fbbf24">alembic upgrade head (docker exec)</text>

  <!-- Caption -->
  <text x="430" y="385" text-anchor="middle" font-size="11" fill="#9ca3af">Les services communiquent via le réseau interne Docker · Les données PostgreSQL sont persistées dans un volume nommé</text>

  <defs>
    <marker id="adpl" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f0883e"/>
    </marker>
    <marker id="adpl2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>
