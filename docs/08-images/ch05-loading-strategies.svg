<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="420" fill="#0d1117" rx="12"/>
  <text x="430" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#f0883e">Lazy loading vs Joinedload vs Selectinload — requêtes SQL générées</text>

  <!-- Section titles -->
  <text x="143" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#ef4444">Lazy Loading ❌</text>
  <text x="430" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#22c55e">joinedload() ✓</text>
  <text x="717" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#60a5fa">selectinload() ✓</text>

  <!-- Dividers -->
  <line x1="288" y1="55" x2="288" y2="380" stroke="#374151" stroke-width="1"/>
  <line x1="574" y1="55" x2="574" y2="380" stroke="#374151" stroke-width="1"/>

  <!-- ====== LAZY LOADING ====== -->
  <!-- Requête 1 -->
  <rect x="20" y="80" width="246" height="28" rx="4" fill="#3a0000" stroke="#ef4444"/>
  <text x="30" y="98" font-size="9" fill="#f87171">SELECT * FROM articles WHERE publie=true</text>
  <text x="30" y="113" font-size="9" fill="#6b7280">→ 3 articles chargés</text>

  <!-- N requêtes -->
  <rect x="20" y="128" width="246" height="24" rx="4" fill="#3a0000" stroke="#ef4444" stroke-dasharray="3,2"/>
  <text x="30" y="144" font-size="9" fill="#f87171">SELECT * FROM utilisateurs WHERE id=1</text>
  <rect x="20" y="156" width="246" height="24" rx="4" fill="#3a0000" stroke="#ef4444" stroke-dasharray="3,2"/>
  <text x="30" y="172" font-size="9" fill="#f87171">SELECT * FROM utilisateurs WHERE id=2</text>
  <rect x="20" y="184" width="246" height="24" rx="4" fill="#3a0000" stroke="#ef4444" stroke-dasharray="3,2"/>
  <text x="30" y="200" font-size="9" fill="#f87171">SELECT * FROM utilisateurs WHERE id=1</text>

  <text x="143" y="226" text-anchor="middle" font-size="10" fill="#ef4444">4 requêtes pour 3 articles</text>
  <text x="143" y="240" text-anchor="middle" font-size="9" fill="#6b7280">Avec 50 articles → 51 requêtes</text>

  <!-- Code -->
  <rect x="20" y="258" width="246" height="60" rx="4" fill="#1f2937" stroke="#4b5563"/>
  <text x="30" y="276" font-size="9" fill="#9ca3af"># Lazy (défaut)</text>
  <text x="30" y="291" font-size="9" fill="#e2e8f0">stmt = select(Article)</text>
  <text x="30" y="306" font-size="9" fill="#e2e8f0">.where(Article.publie==True)</text>

  <!-- ====== JOINEDLOAD ====== -->
  <rect x="308" y="80" width="246" height="100" rx="4" fill="#1a2e1a" stroke="#22c55e"/>
  <text x="318" y="98" font-size="9" fill="#86efac">SELECT articles.*, utilisateurs.*</text>
  <text x="318" y="113" font-size="9" fill="#86efac">FROM articles</text>
  <text x="318" y="128" font-size="9" fill="#86efac">JOIN utilisateurs</text>
  <text x="318" y="143" font-size="9" fill="#86efac">ON articles.auteur_id = utilisateurs.id</text>
  <text x="318" y="158" font-size="9" fill="#86efac">WHERE articles.publie = true</text>
  <text x="318" y="173" font-size="9" fill="#6b7280">→ 3 lignes, auteur inclus</text>

  <text x="430" y="205" text-anchor="middle" font-size="10" fill="#22c55e">1 seule requête ✓</text>
  <text x="430" y="219" text-anchor="middle" font-size="9" fill="#6b7280">Adapté : relation to-one</text>

  <rect x="308" y="234" width="246" height="80" rx="4" fill="#1f2937" stroke="#22c55e"/>
  <text x="318" y="252" font-size="9" fill="#9ca3af"># Eager — joinedload</text>
  <text x="318" y="267" font-size="9" fill="#e2e8f0">stmt = (</text>
  <text x="318" y="282" font-size="9" fill="#e2e8f0">  select(Article)</text>
  <text x="318" y="297" font-size="9" fill="#86efac">  .options(joinedload(Article.auteur))</text>
  <text x="318" y="312" font-size="9" fill="#e2e8f0">)</text>

  <!-- ====== SELECTINLOAD ====== -->
  <rect x="594" y="80" width="246" height="56" rx="4" fill="#1e3a5f" stroke="#60a5fa"/>
  <text x="604" y="98" font-size="9" fill="#93c5fd">SELECT * FROM articles WHERE publie=true</text>
  <text x="604" y="113" font-size="9" fill="#6b7280">→ IDs récupérés : [1, 2, 3]</text>
  <rect x="594" y="144" width="246" height="40" rx="4" fill="#1e3a5f" stroke="#60a5fa"/>
  <text x="604" y="162" font-size="9" fill="#93c5fd">SELECT * FROM tags</text>
  <text x="604" y="177" font-size="9" fill="#93c5fd">WHERE article_id IN (1, 2, 3)</text>

  <text x="717" y="205" text-anchor="middle" font-size="10" fill="#60a5fa">2 requêtes — collection IN</text>
  <text x="717" y="219" text-anchor="middle" font-size="9" fill="#6b7280">Adapté : relation to-many</text>

  <rect x="594" y="234" width="246" height="80" rx="4" fill="#1f2937" stroke="#60a5fa"/>
  <text x="604" y="252" font-size="9" fill="#9ca3af"># Eager — selectinload</text>
  <text x="604" y="267" font-size="9" fill="#e2e8f0">stmt = (</text>
  <text x="604" y="282" font-size="9" fill="#e2e8f0">  select(Article)</text>
  <text x="604" y="297" font-size="9" fill="#60a5fa">  .options(selectinload(Article.tags))</text>
  <text x="604" y="312" font-size="9" fill="#e2e8f0">)</text>

  <!-- Summary bar -->
  <rect x="20" y="342" width="820" height="52" rx="8" fill="#1f2937" stroke="#4b5563"/>
  <text x="430" y="361" text-anchor="middle" font-size="11" font-weight="bold" fill="#e2e8f0">Règle de choix</text>
  <text x="143" y="381" text-anchor="middle" font-size="10" fill="#ef4444">Lazy : éviter si accès en boucle</text>
  <text x="430" y="381" text-anchor="middle" font-size="10" fill="#22c55e">joinedload : relation to-one (auteur, catégorie)</text>
  <text x="717" y="381" text-anchor="middle" font-size="10" fill="#60a5fa">selectinload : relation to-many (tags, articles)</text>
</svg>
