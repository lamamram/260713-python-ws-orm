<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="420" fill="#0d1117" rx="12"/>
  <text x="430" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#f0883e">Organisation modulaire avec APIRouter</text>

  <!-- main.py -->
  <rect x="330" y="60" width="200" height="80" rx="8" fill="#3a2000" stroke="#f0883e" stroke-width="2"/>
  <text x="430" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#f0883e">main.py</text>
  <text x="430" y="102" text-anchor="middle" font-size="10" fill="#fbbf24">app = FastAPI(...)</text>
  <text x="430" y="118" text-anchor="middle" font-size="10" fill="#fbbf24">app.include_router(articles.router)</text>
  <text x="430" y="132" text-anchor="middle" font-size="10" fill="#fbbf24">app.include_router(auteurs.router)</text>

  <!-- Arrows down -->
  <line x1="380" y1="140" x2="240" y2="195" stroke="#f0883e" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="430" y1="140" x2="430" y2="195" stroke="#f0883e" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="480" y1="140" x2="620" y2="195" stroke="#f0883e" stroke-width="1.5" marker-end="url(#ao)"/>

  <!-- routers/articles.py -->
  <rect x="100" y="195" width="280" height="110" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="240" y="217" text-anchor="middle" font-size="12" font-weight="bold" fill="#60a5fa">routers/articles.py</text>
  <text x="240" y="235" text-anchor="middle" font-size="10" fill="#93c5fd">router = APIRouter(prefix="/articles")</text>
  <rect x="115" y="244" width="250" height="20" rx="3" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="240" y="258" text-anchor="middle" font-size="9" fill="#93c5fd">@router.get("/") → list_articles()</text>
  <rect x="115" y="268" width="250" height="20" rx="3" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="240" y="282" text-anchor="middle" font-size="9" fill="#93c5fd">@router.post("/") → create_article()</text>
  <rect x="115" y="292" width="250" height="20" rx="3" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="240" y="306" text-anchor="middle" font-size="9" fill="#93c5fd">@router.get("/{id}") @router.put @router.delete</text>

  <!-- routers/auteurs.py -->
  <rect x="480" y="195" width="280" height="110" rx="8" fill="#1f2937" stroke="#22c55e" stroke-width="1.5"/>
  <text x="620" y="217" text-anchor="middle" font-size="12" font-weight="bold" fill="#86efac">routers/auteurs.py</text>
  <text x="620" y="235" text-anchor="middle" font-size="10" fill="#4ade80">router = APIRouter(prefix="/auteurs")</text>
  <rect x="495" y="244" width="250" height="20" rx="3" fill="#1a2e1a" stroke="#22c55e"/>
  <text x="620" y="258" text-anchor="middle" font-size="9" fill="#86efac">@router.get("/") → list_auteurs()</text>
  <rect x="495" y="268" width="250" height="20" rx="3" fill="#1a2e1a" stroke="#22c55e"/>
  <text x="620" y="282" text-anchor="middle" font-size="9" fill="#86efac">@router.post("/") → create_auteur()</text>
  <rect x="495" y="292" width="250" height="20" rx="3" fill="#1a2e1a" stroke="#22c55e"/>
  <text x="620" y="306" text-anchor="middle" font-size="9" fill="#86efac">@router.get("/{id}") → get_auteur()</text>

  <!-- schemas/ -->
  <rect x="100" y="330" width="280" height="60" rx="8" fill="#1f2937" stroke="#a855f7" stroke-width="1.5"/>
  <text x="240" y="350" text-anchor="middle" font-size="12" font-weight="bold" fill="#d8b4fe">schemas/article.py</text>
  <text x="240" y="368" text-anchor="middle" font-size="10" fill="#c084fc">ArticleCreation · ArticleMiseAJour · ArticleReponse</text>
  <text x="240" y="383" text-anchor="middle" font-size="9" fill="#9ca3af">Modèles Pydantic partagés</text>

  <rect x="480" y="330" width="280" height="60" rx="8" fill="#1f2937" stroke="#a855f7" stroke-width="1.5"/>
  <text x="620" y="350" text-anchor="middle" font-size="12" font-weight="bold" fill="#d8b4fe">schemas/auteur.py</text>
  <text x="620" y="368" text-anchor="middle" font-size="10" fill="#c084fc">AuteurCreation · AuteurReponse</text>
  <text x="620" y="383" text-anchor="middle" font-size="9" fill="#9ca3af">Modèles Pydantic partagés</text>

  <!-- Arrows from routers to schemas -->
  <line x1="240" y1="305" x2="240" y2="330" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ap)"/>
  <line x1="620" y1="305" x2="620" y2="330" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ap)"/>

  <!-- URLs generated -->
  <text x="160" y="175" text-anchor="middle" font-size="9" fill="#6b7280">/articles/*</text>
  <text x="690" y="175" text-anchor="middle" font-size="9" fill="#6b7280">/auteurs/*</text>

  <defs>
    <marker id="ao" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f0883e"/>
    </marker>
    <marker id="ap" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
  </defs>
</svg>
