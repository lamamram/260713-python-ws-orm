<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" width="860" height="380" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="380" fill="#0d1117" rx="12"/>
  <text x="430" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#f0883e">Flux de gestion des erreurs dans FastAPI</text>

  <!-- Requête client -->
  <rect x="30" y="70" width="120" height="40" rx="6" fill="#1f2937" stroke="#4b5563"/>
  <text x="90" y="95" text-anchor="middle" font-size="12" fill="#e2e8f0">Requête HTTP</text>

  <!-- Arrow -->
  <line x1="150" y1="90" x2="210" y2="90" stroke="#60a5fa" stroke-width="2" marker-end="url(#abe)"/>

  <!-- FastAPI Router -->
  <rect x="210" y="70" width="120" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="270" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#60a5fa">Routeur</text>
  <text x="270" y="104" text-anchor="middle" font-size="9" fill="#93c5fd">Correspondance URL</text>

  <!-- Arrow -->
  <line x1="330" y1="90" x2="390" y2="90" stroke="#60a5fa" stroke-width="2" marker-end="url(#abe)"/>

  <!-- Pydantic Validation -->
  <rect x="390" y="70" width="140" height="40" rx="6" fill="#2d1f3d" stroke="#a855f7"/>
  <text x="460" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="#d8b4fe">Validation Pydantic</text>
  <text x="460" y="103" text-anchor="middle" font-size="9" fill="#c084fc">Types · Contraintes · Modèles</text>

  <!-- 422 branch -->
  <line x1="460" y1="110" x2="460" y2="150" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ared)"/>
  <rect x="390" y="150" width="140" height="32" rx="5" fill="#3a0000" stroke="#ef4444"/>
  <text x="460" y="166" text-anchor="middle" font-size="10" font-weight="bold" fill="#f87171">422 Unprocessable Entity</text>
  <text x="460" y="177" text-anchor="middle" font-size="9" fill="#ef4444">Automatique · Corps JSON détaillé</text>
  <text x="390" y="145" text-anchor="start" font-size="9" fill="#ef4444">Invalide</text>

  <!-- Arrow to handler -->
  <line x1="530" y1="90" x2="590" y2="90" stroke="#22c55e" stroke-width="2" marker-end="url(#agr)"/>
  <text x="560" y="82" text-anchor="middle" font-size="9" fill="#22c55e">Valide</text>

  <!-- Handler -->
  <rect x="590" y="70" width="140" height="40" rx="6" fill="#1a2e1a" stroke="#22c55e"/>
  <text x="660" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="#86efac">Gestionnaire</text>
  <text x="660" y="103" text-anchor="middle" font-size="9" fill="#4ade80">Code métier</text>

  <!-- HTTPException branch -->
  <line x1="660" y1="110" x2="660" y2="150" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ayel)"/>
  <rect x="590" y="150" width="140" height="32" rx="5" fill="#2d1a00" stroke="#f59e0b"/>
  <text x="660" y="166" text-anchor="middle" font-size="10" font-weight="bold" fill="#fbbf24">HTTPException levée</text>
  <text x="660" y="177" text-anchor="middle" font-size="9" fill="#f59e0b">status_code + detail</text>
  <text x="590" y="145" text-anchor="start" font-size="9" fill="#f59e0b">Erreur métier</text>

  <!-- Success path -->
  <line x1="730" y1="90" x2="790" y2="90" stroke="#22c55e" stroke-width="2" marker-end="url(#agr)"/>
  <rect x="790" y="70" width="50" height="40" rx="6" fill="#1a2e1a" stroke="#22c55e"/>
  <text x="815" y="88" text-anchor="middle" font-size="10" fill="#86efac">200</text>
  <text x="815" y="103" text-anchor="middle" font-size="9" fill="#4ade80">OK</text>

  <!-- Custom Exception Handler section -->
  <rect x="30" y="230" width="800" height="120" rx="10" fill="#1f2937" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="430" y="254" text-anchor="middle" font-size="13" font-weight="bold" fill="#60a5fa">Handlers d'exception personnalisés — @app.exception_handler</text>

  <rect x="50" y="265" width="220" height="70" rx="6" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="160" y="284" text-anchor="middle" font-size="11" fill="#93c5fd">Exception applicative custom</text>
  <text x="160" y="300" text-anchor="middle" font-size="9" fill="#6b7280">class ArticleNonTrouveException</text>
  <text x="160" y="315" text-anchor="middle" font-size="9" fill="#6b7280">raise ArticleNonTrouveException(id)</text>

  <line x1="270" y1="300" x2="320" y2="300" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#abe)"/>

  <rect x="320" y="265" width="220" height="70" rx="6" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="430" y="284" text-anchor="middle" font-size="11" fill="#93c5fd">Handler enregistré</text>
  <text x="430" y="300" text-anchor="middle" font-size="9" fill="#6b7280">@app.exception_handler(ArticleNonTrouveException)</text>
  <text x="430" y="315" text-anchor="middle" font-size="9" fill="#6b7280">→ Format uniforme de l'erreur</text>

  <line x1="540" y1="300" x2="590" y2="300" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#abe)"/>

  <rect x="590" y="265" width="220" height="70" rx="6" fill="#3a0000" stroke="#ef4444"/>
  <text x="700" y="284" text-anchor="middle" font-size="11" fill="#f87171">JSONResponse formatée</text>
  <text x="700" y="300" text-anchor="middle" font-size="9" fill="#6b7280">{"erreur": "ARTICLE_NOT_FOUND",</text>
  <text x="700" y="315" text-anchor="middle" font-size="9" fill="#6b7280">"message": "...", "code": 404}</text>

  <!-- Caption -->
  <text x="430" y="368" text-anchor="middle" font-size="11" fill="#9ca3af">Trois niveaux : validation automatique Pydantic (422) · HTTPException (4xx/5xx) · handlers personnalisés</text>

  <defs>
    <marker id="abe" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="agr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="ared" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="ayel" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
