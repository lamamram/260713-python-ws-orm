<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" width="860" height="360" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="360" fill="#0d1117" rx="12"/>
  <text x="430" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#f0883e">Cycle de vie d'un objet SQLAlchemy dans la Session</text>

  <!-- States -->
  <!-- Transient -->
  <rect x="30" y="100" width="160" height="100" rx="10" fill="#1f2937" stroke="#4b5563" stroke-width="1.5"/>
  <text x="110" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#9ca3af">Transient</text>
  <text x="110" y="148" text-anchor="middle" font-size="10" fill="#6b7280">Objet créé en Python</text>
  <text x="110" y="163" text-anchor="middle" font-size="10" fill="#6b7280">Pas dans la session</text>
  <text x="110" y="178" text-anchor="middle" font-size="10" fill="#6b7280">Pas dans la DB</text>
  <text x="110" y="193" text-anchor="middle" font-size="9" fill="#4b5563">user = Utilisateur(...)</text>

  <!-- Pending -->
  <rect x="240" y="100" width="160" height="100" rx="10" fill="#1f2937" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="320" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#fbbf24">Pending</text>
  <text x="320" y="148" text-anchor="middle" font-size="10" fill="#6b7280">Dans la session</text>
  <text x="320" y="163" text-anchor="middle" font-size="10" fill="#6b7280">Pas encore en DB</text>
  <text x="320" y="178" text-anchor="middle" font-size="10" fill="#6b7280">INSERT planifié</text>
  <text x="320" y="193" text-anchor="middle" font-size="9" fill="#f59e0b">db.add(user)</text>

  <!-- Persistent -->
  <rect x="450" y="100" width="160" height="100" rx="10" fill="#1a2e1a" stroke="#22c55e" stroke-width="2"/>
  <text x="530" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#86efac">Persistent</text>
  <text x="530" y="148" text-anchor="middle" font-size="10" fill="#6b7280">Dans la session</text>
  <text x="530" y="163" text-anchor="middle" font-size="10" fill="#6b7280">Synchronisé avec la DB</text>
  <text x="530" y="178" text-anchor="middle" font-size="10" fill="#6b7280">Modifications trackées</text>
  <text x="530" y="193" text-anchor="middle" font-size="9" fill="#22c55e">db.commit() / db.get()</text>

  <!-- Detached -->
  <rect x="660" y="100" width="160" height="100" rx="10" fill="#1f2937" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="740" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#60a5fa">Detached</text>
  <text x="740" y="148" text-anchor="middle" font-size="10" fill="#6b7280">Plus dans la session</text>
  <text x="740" y="163" text-anchor="middle" font-size="10" fill="#6b7280">Objet existe en Python</text>
  <text x="740" y="178" text-anchor="middle" font-size="10" fill="#6b7280">Accès aux relat. bloqué</text>
  <text x="740" y="193" text-anchor="middle" font-size="9" fill="#60a5fa">db.close() / expunge()</text>

  <!-- Transitions -->
  <!-- Transient → Pending -->
  <line x1="190" y1="148" x2="240" y2="148" stroke="#f59e0b" stroke-width="2" marker-end="url(#asl)"/>
  <text x="215" y="140" text-anchor="middle" font-size="9" fill="#f59e0b">db.add(obj)</text>

  <!-- Pending → Persistent -->
  <line x1="400" y1="148" x2="450" y2="148" stroke="#22c55e" stroke-width="2" marker-end="url(#asl2)"/>
  <text x="425" y="140" text-anchor="middle" font-size="9" fill="#22c55e">db.commit()</text>
  <text x="425" y="158" text-anchor="middle" font-size="8" fill="#6b7280">→ INSERT exécuté</text>

  <!-- Persistent → Detached -->
  <line x1="610" y1="148" x2="660" y2="148" stroke="#60a5fa" stroke-width="2" marker-end="url(#asl3)"/>
  <text x="635" y="140" text-anchor="middle" font-size="9" fill="#60a5fa">db.close()</text>
  <text x="635" y="158" text-anchor="middle" font-size="8" fill="#6b7280">expunge(obj)</text>

  <!-- Detached → Persistent (re-attach) -->
  <path d="M 740 200 Q 740 240 530 240 Q 450 240 450 200" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#asl3)"/>
  <text x="600" y="256" text-anchor="middle" font-size="9" fill="#60a5fa">db.add(obj) — réattachement</text>

  <!-- Persistent self-loop (update/delete) -->
  <path d="M 530 100 Q 530 65 560 65 Q 590 65 590 100" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="560" y="58" text-anchor="middle" font-size="9" fill="#22c55e">obj.attr = val → db.commit()</text>

  <!-- Session box around Pending + Persistent -->
  <rect x="228" y="82" width="398" height="140" rx="6" fill="none" stroke="#4b5563" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="427" y="80" text-anchor="middle" font-size="10" fill="#4b5563">Session active</text>

  <!-- DB box -->
  <rect x="390" y="290" width="280" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="530" y="315" text-anchor="middle" font-size="11" fill="#60a5fa">Base de données (SQL)</text>
  <line x1="530" y1="200" x2="530" y2="290" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#asl4)"/>
  <text x="545" y="248" font-size="9" fill="#3b82f6">SQL généré</text>

  <!-- Caption -->
  <text x="430" y="348" text-anchor="middle" font-size="11" fill="#9ca3af">Les objets detached ne peuvent pas charger leurs relations — risque de DetachedInstanceError</text>

  <defs>
    <marker id="asl" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="asl2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="asl3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="asl4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>
